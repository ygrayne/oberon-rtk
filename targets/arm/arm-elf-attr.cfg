# ARM ELF Attributes
#
# Tag_CPU_name: string — ARM core marketing name
#   "Cortex-M0"  "Cortex-M0+"  "Cortex-M1"  "Cortex-M3"
#   "Cortex-M4"  "Cortex-M7"   "Cortex-M23" "Cortex-M33"
#   "Cortex-M35P" "Cortex-M55" "Cortex-M85"
#
# Tag_CPU_arch: integer — architecture code
#   11 = ARMv6-M            (M0, M0+, M1)
#   13 = ARMv7E-M           (M4, M7)
#   16 = ARMv8-M.baseline   (M23)
#   17 = ARMv8-M.mainline   (M33, M35P)
#   21 = ARMv8.1-M.mainline (M55, M85)
#
# Tag_CPU_arch_profile: integer — architecture profile
#   0x41 = Application (A)
#   0x52 = Realtime (R)
#   0x4D = Microcontroller (M)
#
# Tag_THUMB_ISA_use: integer — Thumb instruction set
#   1 = Thumb-1   (M0, M0+, M1, M23)
#   2 = Thumb-2   (M3, M4, M7, M33, M35P, M55, M85)
#
# Tag_FP_arch: integer — floating point architecture (omit if no FPU)
#   0 = none
#   4 = FPv4-SP   (M4)
#   6 = FPv5      (M7, M33, M35P)
#
# Tag_ABI_VFP_args: integer — float calling convention (omit if no FPU)
#   0 = soft-float ABI
#   1 = hard-float ABI
#
# Tag_DSP_extension: integer — DSP instructions (optional on M33, M35P)
#   0 = not present
#   1 = present


[Cortex-M33]
Tag_CPU_name = "Cortex-M33"
Tag_CPU_arch = 17
Tag_CPU_arch_profile = 0x4D
Tag_THUMB_ISA_use = 2
Tag_FP_arch = 6
Tag_ABI_VFP_args = 1

[Cortex-M0+]
Tag_CPU_name = "Cortex-M0+"
Tag_CPU_arch = 11
Tag_CPU_arch_profile = 0x4D
Tag_THUMB_ISA_use = 1

[STM32U585]
CPU = Cortex-M33
Tag_DSP_extension = 1

[STM32H573]
CPU = Cortex-M33
Tag_DSP_extension = 1

[RP2350]
CPU = Cortex-M33
Tag_DSP_extension = 1

[RP2040]
CPU = Cortex-M0+

[MCX-N947]
CPU = Cortex-M33
Tag_DSP_extension = 1

[MCXN947]
CPU = Cortex-M33
Tag_DSP_extension = 1

[MCX-A346]
CPU = Cortex-M33
Tag_DSP_extension = 1

[MCXA346]
CPU = Cortex-M33
Tag_DSP_extension = 1
